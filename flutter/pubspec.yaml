publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  fl_chart: ^0.68.0
  intl: ^0.19.0
  file_picker: ^8.0.6
  share_plus: ^9.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
